// "class" should exactly match your classname; "group" can be anything. "general" and "multiselection" groups are shown automatically when appropriate.
// Supported tags are <b> for Bold and <br> for line break. Action name inside of <k> tag will insert keyboard shortcut for given action in bold.
// Only single-line comments are supported.

class RejectExplorerMode
group general
"This mode visualizes the reject information of the map."
"<b>Colors (default):</b>"
"<b>Gray:</b> there is no line of sight between the highlighted sector and this sector"
"<b>Light green:</b> currently highlighted sector"
"<b>Dark green:</b> there is a bidirectional line of sight between the highlighted sector and this sector"
"<b>Yellow:</b> there is a unidirectional line of sight from the highlighted sector to this sector"
"<b>Purple:</b> there is a unidirectional line of sight from this sector to the highlighted sector"
"Colors can be customized in the settings (see button in the toolbar)"