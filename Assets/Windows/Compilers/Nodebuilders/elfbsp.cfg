
// Ultimate Doom Builder configuration file for elfbsp

compilers
{
	elfbsp
	{
		interface = "NodesCompiler";
		program = "elfbsp.exe";
	}
}

nodebuilders
{
	elfbsp_normal
	{
		title = "ELFBSP - Normal";
		compiler = "elfbsp";
		parameters = "%FI --output %FO";
	}

	elfbsp_fast
	{
		title = "ELFBSP - Fast";
		compiler = "elfbsp";
		parameters = "%FI --fast --output %FO";
	}

	elfbsp_normal_hexen
	{
		title = "ELFBSP - Normal (Hexen)";
		compiler = "elfbsp";
		parameters = "%FI --polyobj --output %FO";
	}

	elfbsp_fast_hexen
	{
		title = "ELFBSP - Fast (Hexen)";
		compiler = "elfbsp";
		parameters = "%FI --fast --polyobj --output %FO";
	}
}
